name: Run Automation Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Newman & Allure CLI
        run: |
          npm install -g newman newman-reporter-html allure-commandline

      - name: Start Mock API
        run: |
          nohup uvicorn mock_server.app:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run Pytest Tests
        run: |
          pytest tests --env=dev --alluredir=allure-results

      - name: Run Postman Tests
        run: |
          newman run postman/Hybrid_QA_API.postman_collection.json \
          -r html \
          --reporter-html-export reports/postman_report.html

      - name: Upload Postman Report
        uses: actions/upload-artifact@v4
        with:
          name: postman-report
          path: reports/postman_report.html

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Debug files
        run: |
          ls -R

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages